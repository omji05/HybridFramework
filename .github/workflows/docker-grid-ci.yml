name: Docker Grid CI

on:
  workflow_dispatch:
    inputs:
      suite:
        description: 'BDD suite profile (default, smoke, regression, api, mock)'
        required: false
        default: 'smoke'
      environment:
        description: 'Target environment (qa, staging)'
        required: false
        default: 'qa'
        type: choice
        options:
          - qa
          - staging

env:
  MAVEN_IMAGE: maven:3.9-eclipse-temurin-17
  SELENIUM_VERSION: '4.27.0'
  GRID_NETWORK: selenium-grid_default
  MAVEN_OPTS: '-Xmx1024m'

jobs:
  test:
    name: Grid (${{ github.event.inputs.suite || 'smoke' }} / ${{ github.event.inputs.environment || 'qa' }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Start Selenium Grid (hub + Chrome node)
        env:
          # Runner-level proxy can break in-container hub health checks (GHA env keys are case-insensitive)
          NO_PROXY: localhost,127.0.0.1,selenium-hub,node-chrome
        run: |
          docker compose up -d

          echo "Waiting for Selenium Grid hub..."
          for i in $(seq 1 60); do
            if curl -sf --noproxy '*' http://localhost:4444/status | grep -q '"ready"'; then
              echo "Grid hub is ready."
              docker compose ps
              exit 0
            fi
            sleep 2
          done

          echo "Grid hub did not become ready in time."
          docker compose ps -a
          docker logs selenium-hub
          exit 1

      - name: Run BDD suite via Grid
        id: primary
        env:
          API_KEY: ${{ secrets.REQRES_API_KEY }}
          API_AUTH_USERNAME: ${{ secrets.API_AUTH_USERNAME }}
          API_AUTH_PASSWORD: ${{ secrets.API_AUTH_PASSWORD }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        run: |
          SUITE="${{ github.event.inputs.suite || 'smoke' }}"
          TARGET_ENV="${{ github.event.inputs.environment || 'qa' }}"

          MVN_ARGS="-Denvironment=$TARGET_ENV -Dbrowser=chrome -Dheadless=true \
            -Dremote.url=http://selenium-hub:4444 \
            -Dbdd.rerun.enabled=false \
            -Dtestng.suite.name=testng-bdd-primary.xml \
            -Dapi.log.verbose=false"

          if [ "$SUITE" = "default" ]; then
            TEST_CMD="mvn clean test $MVN_ARGS"
          else
            TEST_CMD="mvn clean test -P$SUITE $MVN_ARGS"
          fi

          docker run --rm \
            --network "$GRID_NETWORK" \
            -v "${{ github.workspace }}:/app" \
            -w /app \
            -e MAVEN_OPTS \
            -e API_KEY \
            -e API_AUTH_USERNAME \
            -e API_AUTH_PASSWORD \
            -e TEST_EMAIL \
            -e TEST_PASSWORD \
            "$MAVEN_IMAGE" \
            sh -c "$TEST_CMD"
        continue-on-error: true

      - name: Load Allure history from gh-pages
        if: always()
        uses: actions/checkout@v5
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Preserve Allure history (grid report)
        if: always()
        run: |
          mkdir -p target/allure-results/history
          if [ -d gh-pages/history ]; then
            cp -r gh-pages/history/* target/allure-results/history/ || true
          fi

      - name: Generate Allure report
        if: always()
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/app" \
            -w /app \
            "$MAVEN_IMAGE" \
            mvn allure:report

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: allure-results-grid
          path: target/allure-results/
          retention-days: 30

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: allure-report-grid
          path: target/site/allure-maven-plugin/
          retention-days: 30

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-logs-grid
          path: logs/
          if-no-files-found: warn
          retention-days: 15

      - name: Stop Selenium Grid
        if: always()
        run: docker compose down -v

      - name: Fail job if tests failed
        if: steps.primary.outcome == 'failure'
        run: exit 1

  publish-report:
    name: Publish Allure Report (Grid)
    needs: test
    if: always() && github.ref == 'refs/heads/main' && needs.test.result != 'cancelled'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Download grid Allure report
        uses: actions/download-artifact@v5
        with:
          name: allure-report-grid
          path: allure-report

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          keep_files: false