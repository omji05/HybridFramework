# Selenium 4 Grid — hub + Chrome node (used by .github/workflows/docker-grid-ci.yml)
name: selenium-grid

services:
  selenium-hub:
    image: selenium/hub:${SELENIUM_VERSION:-4.27.0}
    container_name: selenium-hub
    ports:
      - "4442:4442"
      - "4443:4443"
      - "4444:4444"
    environment:
      # GHA runners set HTTP(S)_PROXY; bypass for in-container health checks
      NO_PROXY: localhost,127.0.0.1,selenium-hub
      no_proxy: localhost,127.0.0.1,selenium-hub
    healthcheck:
      test: ["CMD-SHELL", "curl -sf --noproxy '*' http://localhost:4444/status | grep -q '\"ready\"'"]
      interval: 15s
      timeout: 30s
      retries: 10
      start_period: 30s

  node-chrome:
    image: selenium/node-chrome:${SELENIUM_VERSION:-4.27.0}
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      SE_EVENT_BUS_HOST: selenium-hub
      SE_EVENT_BUS_PUBLISH_PORT: "4442"
      SE_EVENT_BUS_SUBSCRIBE_PORT: "4443"
      SE_NODE_MAX_SESSIONS: "2"
      NO_PROXY: localhost,127.0.0.1,selenium-hub
      no_proxy: localhost,127.0.0.1,selenium-hub
    shm_size: "2gb"
