# ═══════════════════════════════════════════════════════════════════════
#                 HYBRID FRAMEWORK — CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════
# Override at runtime: -Dkey=value or env KEY_NAME (e.g. api.key -> API_KEY)
#   -Dkey=value  (System property)
#   KEY_NAME=value (Environment variable — dots replaced with underscores)
# ═══════════════════════════════════════════════════════════════════════

# ──────────── Browser Configuration ────────────
browser=chrome
headless=false
# Supported: chrome, firefox, edge
# Selenium Grid URL for remote WebDriver (empty = local browser). Docker CI: -Dremote.url=http://selenium-hub:4444
remote.url=

# ──────────── Application URLs ────────────
base.url=https://eventhub.rahulshettyacademy.com
api.base.uri=https://api.eventhub.rahulshettyacademy.com/api
# api.base.uri=https://api.realworld.show
# Authorization scheme for api.auth token header: Token (RealWorld) or Bearer (JWT/OAuth)
# api.auth.scheme=Token
api.auth.scheme=Bearer
# API key for x-api-key header — set locally for dev; leave empty (api.key=) before pushing to git. CI uses API_KEY secret.
api.key=
# Rest Assured request/response body logging (false in CI: API_LOG_VERBOSE=false)
api.log.verbose=true
# Max acceptable response time (ms) for ApiResponseUtils.assertResponseTimeWithinDefaultLimit()
api.response.max.time.ms=5000
# Redact sensitive headers from Rest Assured console logs (API_LOG_BLACKLIST_ENABLED=false to disable)
api.log.blacklist.enabled=true
# Optional: replace default blacklist entirely (comma-separated header names) else keep it commented for default blacklist
# api.log.blacklist.headers=Authorization,x-api-key,Cookie,Set-Cookie
# Optional: add headers to the default blacklist
api.log.blacklist.headers.extra=
# Redact sensitive JSON fields in Allure result files after each suite (before mvn allure:report)
api.log.redact.enabled=true
# Optional: replace default field list (password, token, access_token, refresh_token, secret, api_key, apikey)
# api.log.redact.fields=password,token,access_token

# ──────────── JWT / Bearer auth (active when username + password are set; use CI secrets) ────────────
# api.auth.token.path=/api/login
# api.auth.token.jsonpath=access_token
api.auth.token.path=/auth/login
api.auth.token.jsonpath=token
api.auth.token.expected.status=200
api.auth.username=
api.auth.password=

# ──────────── Timeouts (seconds) ────────────
implicit.wait=10
explicit.wait=15
page.load.timeout=30

# ──────────── Parallel Execution ────────────
# TestNG thread pool (Maven filters testng*.xml at build time). Override: -Dparallel.thread.count=N
parallel.thread.count=3

# ──────────── Downloads ────────────
# Base directory for browser downloads (each parallel thread gets a subfolder)
download.dir=target/downloads
# Max wait (seconds) for DownloadUtils.waitForDownload()
download.wait.timeout=30

# ──────────── Screenshot ────────────
screenshot.enabled=true
screenshot.on.pass=false
screenshot.on.fail=true

# ──────────── Retry ────────────
retry.count=2
# BDD rerun: re-executes failed Cucumber scenarios via rerun.txt (true/false)
bdd.rerun.enabled=false

# ──────────── Database ────────────
# Set db.enabled=true and align SQL with your schema for @db Cucumber scenarios
db.enabled=false
db.url=jdbc:mysql://localhost:3306/testdb
db.username=testuser
# Encrypted value — use PasswordUtils.encrypt("yourpassword") to generate
db.password.encrypted=dGVzdHBhc3N3b3Jk
db.verify.user.exists.sql=SELECT COUNT(*) AS cnt FROM users WHERE id = ?

# ──────────── Reporting ────────────
extent.report.enabled=true
#not utilized in the framework
allure.report.enabled=true

# ──────────── Logging ────────────
log.level=INFO

# ──────────── Environment ────────────
# Profile key: qa | staging | prod (overlays src/test/resources/environments/config-{env}.properties)
# Override in CI: -Denvironment=staging or ENVIRONMENT=staging
environment=qa

# ──────────── EventHub UI test account ────────────
# Register at {base.url}/register, then set credentials here.
# Override in CI via environment variables: TEST_EMAIL, TEST_PASSWORD
test.email=
test.password=  